name: c_kas
description: Aplikasi pencatatan usaha UMKM offline untuk Warung Nasi Bu Ai.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  fl_chart: ^0.66.0
  alarm: ^4.0.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo_ckas.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/alarm.mp3
